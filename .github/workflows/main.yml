name: Daily A-share deep value screener

on:
  workflow_dispatch:
  schedule:
    # 北京时间周一至周五 08:30 = UTC 同日 00:30（中国无夏令时）
    - cron: "30 0 * * 1-5"

jobs:
  screen:
    runs-on: ubuntu-latest
    env:
      PUSH_KEY: ${{ secrets.PUSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run deep value funnel
        run: python run_deep_value_funnel.py

      - name: Upload screening CSV artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screening-csv-${{ github.run_id }}
          path: |
            step1_basic_pool.csv
            step2_finance_pool.csv
            deep_value_pool_*.csv
          if-no-files-found: warn
